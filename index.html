<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
  <meta name="referrer" content="no-referrer" />
  <meta name="description" content="StadiumPilot: AI-assisted fan navigation and stadium operations for FIFA World Cup 2026" />
  <title>StadiumPilot</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="manifest" href="./manifest.json" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="app-header">
    <h1 id="appTitle">StadiumPilot</h1>
    <p id="tagline"></p>
    <div class="header-controls">
      <label for="langSelect" id="langLabelText"></label>
      <select id="langSelect" aria-label="Select language"></select>
      <button id="contrastToggle" type="button">
        <span id="contrastLabelText"></span>
      </button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Primary views">
    <button id="fanTabBtn" role="tab" aria-selected="true" aria-controls="fanPanel" type="button"></button>
    <button id="staffTabBtn" role="tab" aria-selected="false" aria-controls="staffPanel" type="button"></button>
  </nav>

  <main id="main">
    <section id="fanPanel" role="tabpanel" aria-labelledby="fanTabBtn">
      <form id="fanForm">
        <div class="field">
          <label for="standSelect" id="standLabelText"></label>
          <select id="standSelect"></select>
        </div>

        <div class="field checkbox-field">
          <input type="checkbox" id="wheelchairCheck" />
          <label for="wheelchairCheck" id="wheelchairLabelText"></label>
        </div>

        <div class="field">
          <label for="kickoffInput" id="kickoffLabelText"></label>
          <input type="number" id="kickoffInput" value="30" step="5" />
        </div>

        <button id="getRouteBtn" type="button" class="primary-btn"></button>
      </form>

      <div id="routeResult" class="result-panel" aria-live="polite"></div>
    </section>

    <section id="staffPanel" role="tabpanel" aria-labelledby="staffTabBtn" hidden>
      <h2 id="staffHeading"></h2>
      <ul id="staffAlertList" class="alert-list" aria-live="polite"></ul>
    </section>
  </main>

  <footer class="app-footer">
    <p>StadiumPilot — built for PromptWars Challenge 4: Smart Stadiums &amp; Tournament Operations</p>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
